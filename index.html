          <li><strong>Forensic Labs:</strong> Investigate breaker failures, power swings, and transformer differential

        </ul>

    <!-- FCP Loading Skeleton: Ensures Googlebot and users see immediate structure before React Hydration -->
    <style>
      .initial-loader {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background-color: #0f172a;
        font-family: system-ui, -apple-system, sans-serif;
      }

      .loader-nav {

        border-bottom: 1px solid #1e293b;

        align-items: center;
        padding: 0 24px;
        gap: 16px;
      }

      .loader-logo {
        width: 32px;
        height: 32px;
        background-color: #1e293b;
        border-radius: 8px;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      .loader-title {
        width: 140px;
        height: 20px;
        background-color: #1e293b;
        border-radius: 4px;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      .loader-body {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      .loader-sidebar {
        width: 256px;
        border-right: 1px solid #1e293b;
        padding: 24px;
        display: none;
      }

      @media (min-width: 768px) {
        .loader-sidebar {
          display: flex;
          flex-direction: column;
          gap: 16px;
        }
      }

      .loader-menu-item {
        height: 24px;
        background-color: #1e293b;
        border-radius: 4px;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      .loader-main {
        flex: 1;
        padding: 32px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .loader-card {
        height: 200px;
        background-color: #1e293b;
        border-radius: 12px;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes pulse {

        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: .5;
        }
      }
    </style>
